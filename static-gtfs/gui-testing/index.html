<!DOCTYPE html>
<html>
<head>
  <title>Bus Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #map {
      height: 100vh;
    }
    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <label for="tripId">Trip ID:</label>
    <input type="text" id="tripId" placeholder="Enter trip ID">
    <button onclick="loadTripStops()">Load Stops</button>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([43.7, -79.4], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Example marker
    var marker = L.marker([43.7, -79.4]).addTo(map);
    marker.bindPopup("Click to get bus times").openPopup();

    // Draw a line
    var latlngs = [
        [43.7, -79.4],
        [43.75, -79.35],
        [43.8, -79.3]
    ];
    var polyline = L.polyline(latlngs, {color: 'blue', weight: 3}).addTo(map);

    // Array to hold stop markers
    var stopMarkers = [];

    function loadTripStops() {
      const tripId = document.getElementById('tripId').value;
      if (!tripId) {
        alert('Please enter a trip ID');
        return;
      }

      fetch(`http://localhost:5000/tripstops/${tripId}`)
        .then(response => response.json())
        .then(data => {
          // Clear previous markers
          stopMarkers.forEach(marker => map.removeLayer(marker));
          stopMarkers = [];

          // Add new markers
          data.stops.forEach(stop => {
            const marker = L.marker([stop.stop_lat, stop.stop_lon]).addTo(map);
            marker.bindPopup(`${stop.stop_name} (ID: ${stop.stop_id})`);
            stopMarkers.push(marker);
          });

          // Fit map to show all stops
          if (data.stops.length > 0) {
            const bounds = L.latLngBounds(data.stops.map(stop => [stop.stop_lat, stop.stop_lon]));
            map.fitBounds(bounds);
          }
        })
        .catch(error => {
          console.error('Error loading trip stops:', error);
          alert('Error loading trip stops');
        });
    }

    marker.on('click', async function() {
        const response = await fetch('http://localhost:5000/bustimes/42');
        const data = await response.json();
        alert("Bus times:\n" + data.times.join("\n"));
    });
  </script>
</body>
</html>
